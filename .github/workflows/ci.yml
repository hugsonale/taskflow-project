name: TaskFlow CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_BACKEND: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/taskflow-backend
  ECR_FRONTEND: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/taskflow-frontend

jobs:

  # ─── JOB 1: Backend Tests ────────────────────────────────────────────
  backend:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: sqlite:///./test_taskflow.db
          PYTHONPATH: .

  # ─── JOB 2: Frontend Tests ───────────────────────────────────────────
  frontend:
    name: Frontend Tests & Build (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend tests
        run: npm test
        env:
          CI: true

      - name: Build frontend
        run: npm run build
        env:
          CI: false
          REACT_APP_API_URL: http://localhost:8000

  # ─── JOB 3: Build & Push Docker Images to AWS ECR ────────────────────
  build-and-push:
    name: Build & Push to AWS ECR
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          docker build -t $ECR_BACKEND:latest -t $ECR_BACKEND:${{ github.sha }} ./backend
          docker push $ECR_BACKEND:latest
          docker push $ECR_BACKEND:${{ github.sha }}

      - name: Build and push frontend image
        run: |
          docker build -t $ECR_FRONTEND:latest -t $ECR_FRONTEND:${{ github.sha }} ./frontend
          docker push $ECR_FRONTEND:latest
          docker push $ECR_FRONTEND:${{ github.sha }}

  # ─── JOB 4: Deploy to EC2 ─────────────────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Authenticate Docker with ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            # Pull the latest images
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/taskflow-backend:latest
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/taskflow-frontend:latest

            # Stop and remove old containers if they exist
            docker stop taskflow-backend taskflow-frontend 2>/dev/null || true
            docker rm taskflow-backend taskflow-frontend 2>/dev/null || true

            # Start new containers
            docker run -d --name taskflow-backend --restart unless-stopped \
              -p 8000:8000 \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/taskflow-backend:latest

            docker run -d --name taskflow-frontend --restart unless-stopped \
              -p 80:80 \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/taskflow-frontend:latest

            echo "Deployment complete! App is live."

  # ─── JOB 5: CI/CD Summary ─────────────────────────────────────────────
  summary:
    name: Pipeline Complete
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "=============================="
          echo "  TaskFlow CI/CD Pipeline     "
          echo "=============================="
          echo "Backend  : ${{ needs.backend.result }}"
          echo "Frontend : ${{ needs.frontend.result }}"
          echo "=============================="
