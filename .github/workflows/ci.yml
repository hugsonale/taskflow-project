name: TaskFlow CI 

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  
  # Job 1 : Backend - install, lint, test

  backend:
    name: Backend Tests
    runs-on: ubuntu-
    
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt
      
      - name: Run backend test with pytest
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: sqlite:///./taskflow.db
          PYTHONPATH: .

      - name: Upload test database artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-db
          path: backend/test_taskflow.db
          retention-days: 3


  # JOB 2: Frontend — Install, Test, Build

  frontend:
    name: Frontend Tests & Build (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests (Jest)
        run: npm test
        env:
          CI: true

      - name: Build frontend
        run: npm run build
        env:
          CI: false
          REACT_APP_API_URL: http://localhost:8000

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

 
  # JOB 3: CI Summary
  ci-summary:
    name: CI Pipeline Complete
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()

    steps:
      - name: Report pipeline status
        run: |
          echo "=============================="
          echo "  TaskFlow CI Pipeline Report  "
          echo "=============================="
          echo "Backend Tests : ${{ needs.backend.result }}"
          echo "Frontend Tests: ${{ needs.frontend.result }}"
          echo "=============================="
          if [[ "${{ needs.backend.result }}" == "success" && \
                "${{ needs.frontend.result }}" == "success" ]]; then
            echo "✅ All checks passed! Ready to deploy."
          else
            echo "❌ One or more checks failed. Review logs above."
            exit 1
          fi